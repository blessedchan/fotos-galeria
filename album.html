<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #fff;
            color: #000;
            line-height: 1.6;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 1rem 2rem;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #000;
            font-weight: 500;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .hero {
            margin-top: 70px;
            padding: 3rem 2rem;
            text-align: center;
            background: #f5f5f5;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1rem;
            margin-bottom: 1.5rem;
            color: #666;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .search-box {
            padding: 0.7rem 1rem;
            border: 1px solid #000;
            border-radius: 4px;
            font-size: 1rem;
            min-width: 250px;
        }

        .search-box:focus {
            outline: none;
            box-shadow: 0 0 0 2px #000;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
        }

        .btn:hover {
            background: #333;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .stat {
            background: #fff;
            padding: 1rem;
            border: 1px solid #000;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #666;
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .slideshow {
            width: 100%;
            max-height: 500px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 2rem;
            border: 1px solid #000;
            display: none;
        }

        .slideshow img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .slideshow-controls {
            position: absolute;
            bottom: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .slideshow-btn {
            background: #000;
            color: #fff;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        .slideshow-btn:hover {
            background: #333;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .photo {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #ccc;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .photo:hover img {
            transform: scale(1.05);
        }

        .photo-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .photo:hover .photo-info {
            opacity: 1;
        }

        .photo-user {
            font-weight: bold;
            font-size: 0.9rem;
        }

        .photo-date {
            font-size: 0.75rem;
            margin-top: 0.3rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .modal img {
            max-width: 100%;
            max-height: 85vh;
        }

        .modal-close {
            position: absolute;
            top: -30px;
            right: 0;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #000;
            color: #fff;
            border: none;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .modal-nav:hover {
            background: #333;
        }

        .modal-prev {
            left: 1rem;
        }

        .modal-next {
            right: 1rem;
        }

        .modal-info {
            text-align: center;
            color: #fff;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        footer {
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
            padding: 2rem;
            text-align: center;
            color: #666;
            margin-top: 3rem;
        }

        .empty {
            text-align: center;
            padding: 2rem;
            color: #999;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .hero h1 {
                font-size: 1.8rem;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 0.8rem 1rem;
            }

            .logo {
                font-size: 1.2rem;
            }

            .nav-links {
                gap: 1rem;
                font-size: 0.9rem;
            }

            .hero {
                padding: 2rem 1rem;
                margin-top: 60px;
            }

            .hero h1 {
                font-size: 1.5rem;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            .controls {
                gap: 0.5rem;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">📸 Galeria</div>
            <ul class="nav-links">
                <li><a href="album.html">Galeria</a></li>
                <li><a href="upload.html">Upload</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Galeria de Fotos</h1>
        <p>Compartilhando momentos especiais</p>

        <div class="controls">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 Buscar por usuário...">
            <button class="btn" id="filterBtn">📅 Data</button>
            <a href="upload.html" class="btn">➕ Upload</a>
        </div>

        <div id="dateFilterDiv" style="display: none; margin-top: 1rem;">
            <input type="date" id="dateInput" class="search-box" style="max-width: 300px;">
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalPhotos">0</div>
                <div class="stat-label">Fotos</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">Usuários</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="todayPhotos">0</div>
                <div class="stat-label">Hoje</div>
            </div>
        </div>
    </section>

    <div class="content">
        <div class="slideshow" id="slideshow">
            <img id="slideshowImg" src="" alt="">
            <div class="slideshow-controls">
                <button class="slideshow-btn" id="playBtn">▶</button>
                <button class="slideshow-btn" onclick="slidePrev()">◀</button>
                <button class="slideshow-btn" onclick="slideNext()">▶</button>
            </div>
        </div>

        <h2 class="section-title">Fotos</h2>

        <div class="gallery" id="gallery"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <img id="modalImg" src="" alt="">
            <div class="modal-info" id="modalInfo"></div>
            <button class="modal-nav modal-prev" onclick="prevPhoto()">◀</button>
            <button class="modal-nav modal-next" onclick="nextPhoto()">▶</button>
        </div>
    </div>

    <footer>
        <p>© 2026 Galeria de Fotos • Desenvolvido com ❤️</p>
    </footer>

    <script>
        let allPhotos = [];
        let currentPhotoIndex = 0;
        let isPlaying = false;
        let slideInterval;

        async function loadPhotos() {
            try {
                const res = await fetch('/uploads');
                const text = await res.text();
                if (text && text.trim()) {
                    allPhotos = JSON.parse(text);
                }
            } catch (e) {
                console.log('Sem fotos');
            }
            renderGallery();
            updateStats();
            setupSlideshow();
        }

        function getFilteredPhotos() {
            let filtered = [...allPhotos];

            const search = document.getElementById('searchBox').value.toLowerCase();
            if (search) {
                filtered = filtered.filter(p => p.usuario.toLowerCase().includes(search));
            }

            const date = document.getElementById('dateInput').value;
            if (date) {
                filtered = filtered.filter(p => {
                    const pDate = new Date(p.data_upload_utc).toISOString().split('T')[0];
                    return pDate === date;
                });
            }

            return filtered;
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            const photos = getFilteredPhotos();

            if (photos.length === 0) {
                gallery.innerHTML = '<div class="empty" style="grid-column: 1/-1;">Nenhuma foto encontrada</div>';
                return;
            }

            gallery.innerHTML = photos.map((photo, idx) => {
                const realIdx = allPhotos.indexOf(photo);
                return `
                    <div class="photo" onclick="openModal(${realIdx})">
                        <img src="${photo.url_arquivo}" alt="${photo.usuario}">
                        <div class="photo-info">
                            <div class="photo-user">👤 ${photo.usuario}</div>
                            <div class="photo-date">📅 ${new Date(photo.data_upload_utc).toLocaleString('pt-BR')}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];

            document.getElementById('totalPhotos').textContent = allPhotos.length;
            document.getElementById('totalUsers').textContent = new Set(allPhotos.map(p => p.usuario)).size;
            document.getElementById('todayPhotos').textContent = allPhotos.filter(p =>
                new Date(p.data_upload_utc).toISOString().split('T')[0] === today
            ).length;
        }

        function setupSlideshow() {
            const photos = getFilteredPhotos();
            if (photos.length === 0) {
                document.getElementById('slideshow').style.display = 'none';
                return;
            }

            document.getElementById('slideshow').style.display = 'flex';
            updateSlideshow();
        }

        function updateSlideshow() {
            const photos = getFilteredPhotos();
            if (photos.length === 0) return;

            const photo = photos[currentPhotoIndex % photos.length];
            document.getElementById('slideshowImg').src = photo.url_arquivo;
        }

        function slideNext() {
            const photos = getFilteredPhotos();
            if (photos.length === 0) return;
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            updateSlideshow();
        }

        function slidePrev() {
            const photos = getFilteredPhotos();
            if (photos.length === 0) return;
            currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            updateSlideshow();
        }

        document.getElementById('playBtn').addEventListener('click', function() {
            isPlaying = !isPlaying;
            this.textContent = isPlaying ? '⏸' : '▶';

            if (isPlaying) {
                slideInterval = setInterval(slideNext, 4000);
            } else {
                clearInterval(slideInterval);
            }
        });

        document.getElementById('searchBox').addEventListener('input', () => {
            renderGallery();
            setupSlideshow();
        });

        document.getElementById('dateInput').addEventListener('change', () => {
            renderGallery();
            setupSlideshow();
        });

        document.getElementById('filterBtn').addEventListener('click', () => {
            const div = document.getElementById('dateFilterDiv');
            div.style.display = div.style.display === 'none' ? 'block' : 'none';
        });

        function openModal(idx) {
            currentPhotoIndex = idx;
            const photo = allPhotos[idx];
            document.getElementById('modalImg').src = photo.url_arquivo;
            document.getElementById('modalInfo').textContent = `👤 ${photo.usuario} • ${new Date(photo.data_upload_utc).toLocaleString('pt-BR')}`;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % allPhotos.length;
            openModal(currentPhotoIndex);
        }

        function prevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + allPhotos.length) % allPhotos.length;
            openModal(currentPhotoIndex);
        }

        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('modal');
            if (!modal.classList.contains('active')) return;

            if (e.key === 'ArrowRight') nextPhoto();
            if (e.key === 'ArrowLeft') prevPhoto();
            if (e.key === 'Escape') closeModal();
        });

        loadPhotos();
    </script>
</body>
</html>
